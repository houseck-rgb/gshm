<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>가산점 파출 달력</title>

<link rel="icon" type="image/png" href="./hm1.png?v=1">
<link rel="apple-touch-icon" href="./hm1.png?v=1">
<link rel="shortcut icon" href="./hm1.png?v=1">
<meta name="theme-color" content="#0a0a0f">

<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3e;
  --accent:#ff6b35;--accent2:#4ecdc4;--warn:#ff2d55;--ok:#30d158;
  --yellow:#ffd60a;--text:#f0f0fa;--muted:#6e6e88;--purple:#bf5af2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans KR',sans-serif;padding:12px;min-height:100vh}
h1{font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:var(--muted);font-size:11px;margin-bottom:14px;line-height:1.5}

/* 패널 */
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px}
.ptitle{font-size:13px;font-weight:900;color:var(--accent2);margin-bottom:8px}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:9px 11px;font-size:13px;font-family:inherit}
.inp:focus{outline:none;border-color:var(--accent2)}
textarea.inp{min-height:86px;resize:vertical;line-height:1.5}
.hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.btn{border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:900;
  cursor:pointer;font-family:inherit;width:100%}
.btn-gold{background:linear-gradient(135deg,#b8863b,#d8b76b);color:#111}
.btn-sec{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-main{background:var(--accent);color:#fff;margin-top:8px}

/* 주 네비 */
.week-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.wnbtn{background:var(--card);border:1px solid var(--border);color:var(--text);
  width:38px;height:38px;border-radius:10px;font-size:20px;cursor:pointer}
.wlabel{font-size:14px;font-weight:900;color:var(--accent2);min-width:195px;text-align:center}

/* 범례 */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* 7일 그리드 */
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.dcol{background:var(--card);border:2px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .15s}
.dcol.b-urgent{border-color:var(--warn)!important;box-shadow:0 0 6px #ff2d5540}
.dcol.b-call{border-color:var(--accent)}
.dcol.b-hol{border-color:var(--warn)}

/* 날짜 헤더 */
.dh{padding:6px 3px;text-align:center;background:var(--surface);border-bottom:1px solid var(--border)}
.dh .dd{font-size:16px;font-weight:900;display:block}
.dh .dn{font-size:9px;font-weight:700;opacity:.85}
.dh.h-today{background:var(--accent);color:#fff}
.dh.h-hol{background:var(--warn)!important;color:#fff!important}
.dh.h-fri{background:#1a1400;color:var(--yellow)}
.dh.h-we{color:var(--accent)}

/* 직원 칩 */
.dbody{padding:5px 4px}
/* 인원 기준 배지 */
.req{font-size:8px;padding:1px 4px;border-radius:4px;font-weight:900;
  background:#4ecdc420;color:var(--accent2);border:1px solid #4ecdc440;
  vertical-align:middle;margin-left:2px}
.req.req-sp{background:#ffd60a20;color:var(--yellow);border-color:#ffd60a40}
/* 섹션 레이블 */
.slabel{font-size:9px;color:var(--muted);font-weight:900;letter-spacing:.5px;margin:4px 0 2px;display:flex;align-items:center;gap:2px}
.chips{display:flex;flex-wrap:wrap;gap:2px}
.chip{font-size:9.5px;padding:2px 5px;border-radius:12px;border:1px solid;
  cursor:pointer;user-select:none;white-space:nowrap;font-family:inherit;transition:.1s;font-weight:700}
/* 앞주방 - 청록 */
.cf{border-color:#4ecdc460;color:#4ecdc4;background:transparent}
/* 뒷주방 - 보라 */
.cb{border-color:#bf5af260;color:#bf5af2;background:transparent}
/* 홀 - 주황 */
.ch{border-color:#ff6b3560;color:#ff6b35;background:transparent}
/* 휴무 */
.chip.off{background:var(--warn)!important;border-color:var(--warn)!important;color:#fff!important;text-decoration:line-through}
/* 구분선 */
.divider{width:100%;height:1px;background:var(--border);margin:3px 0}

/* 태그 */
.tags{margin-top:4px}
.tag{font-size:8.5px;padding:2px 5px;border-radius:4px;margin-bottom:2px;font-weight:900;line-height:1.4;display:block;word-break:keep-all}
.t-ok{color:var(--ok);border:1px solid var(--ok);background:#30d15810}
.t-call{color:var(--accent);border:1px solid var(--accent);background:#ff6b3510}
.t-urgent{background:var(--warn);color:#fff;animation:pulse .8s infinite}
.t-half{color:var(--yellow);border:1px solid var(--yellow);background:#ffd60a10}
.t-hall{color:var(--accent2);border:1px solid var(--accent2);background:#4ecdc410}
.t-over{color:var(--warn);border:1px solid var(--warn);background:#ff2d5518;font-weight:900}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* 인원 현황 미니 바 */
.status-bar{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.sb{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:900}
.sb-ok{background:#30d15820;color:var(--ok)}
.sb-warn{background:#ff2d5520;color:var(--warn)}
.sb-half{background:#ffd60a20;color:var(--yellow)}
.sb-over{background:#ff2d5520;color:var(--warn);font-weight:900}

/* 결과 패널 */
.result-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px}
.result-panel h2{font-size:14px;font-weight:900;color:var(--accent2);margin-bottom:10px}
.ri{padding:10px 11px;border-radius:9px;margin-bottom:7px;font-size:12px;
  line-height:1.7;border-left:3px solid;white-space:pre-wrap}
.ri-ok{background:#30d15808;border-color:var(--ok)}
.ri-call{background:#ff6b3510;border-color:var(--accent)}
.ri-urgent{background:#ff2d5518;border-color:var(--warn)}
.rday{font-weight:900;font-size:13px;display:block;margin-bottom:2px}
.roff{font-size:10px;color:var(--muted);font-weight:400}

/* 호출 문구 박스 */
.callbox{background:#0c0c18;border:1px solid var(--border);border-radius:11px;
  padding:13px;font-size:13px;line-height:1.8;white-space:pre-line;margin-top:8px;color:var(--text)}

@media(max-width:480px){
  .chip{font-size:9px;padding:2px 4px}
  .grid{gap:3px}
  .two{grid-template-columns:1fr}
}
</style>
</head>
<body>

<h1>🍳 가산점 파출 달력</h1>
<p class="sub">주방 매일 3명 / 홀 평일 2명 / 홀 토·일·공휴일 1명 기준</p>

<div class="week-nav">
  <button class="wnbtn" onclick="changeWeek(-1)">‹</button>
  <span class="wlabel" id="weekLabel"></span>
  <button class="wnbtn" onclick="changeWeek(1)">›</button>
</div>

<div class="legend">
  <div class="li"><div class="ldot" style="background:#4ecdc4"></div>주방 — 람·수먼·테크라즈</div>
  
  <div class="li"><div class="ldot" style="background:#ff6b35"></div>홀 — 지현·애화 / 평일 2명 / 토·일·공휴일 1명 근무</div>
  <div class="li"><div class="ldot" style="background:#ff2d55"></div>공휴일 / 긴급</div>
  <div class="li"><div class="ldot" style="background:#ffd60a"></div>토·일·공휴일 홀 1명 근무</div>
</div>

<div class="panel">
  <div class="ptitle">추가 공휴일 입력</div>
  <input class="inp" id="holidayInput" placeholder="예: 6/6, 8/15 — 법정공휴일은 자동 표시" oninput="saveAndRender()">
</div>

<div class="panel">
  <div class="ptitle">주간 휴무 일괄 입력</div>
  <textarea class="inp" id="bulkInput" placeholder="예:
월 앞주방 부장
화 홀 티투, 과장
수 뒷주방 알레
금 앞주방 천순, 춘옥"></textarea>
  <div class="two">
    <button class="btn btn-gold" onclick="applyBulk()">휴무 자동 입력</button>
    <button class="btn btn-sec" onclick="clearWeek()">이번 주 초기화</button>
  </div>
  <p class="hint">직원 이름을 직접 터치해도 저장됩니다</p>
</div>

<div class="grid" id="grid"></div>

<div class="result-panel">
  <h2>📋 파출 호출 요약</h2>
  <div id="resultList"></div>
  <button class="btn btn-gold" onclick="copyShort()">짧은 호출 문구 복사</button>
  <button class="btn btn-sec" style="margin-top:8px" onclick="copyDetail()">상세 결과 복사</button>
  <div class="callbox" id="callbox">—</div>
</div>

<script>
// ────────────────────────────────────────
//  직원 설정 (중요 포지션만)
// ────────────────────────────────────────
// ────────────────────────────────────────
//  직원 설정 — 전원 중요 포지션
// ────────────────────────────────────────
const F_ALL = ["람","수먼","테크라즈"]; // 주방 직원 3명
const B_ALL = [];                              // 추가 주방 없음
const H_ALL = ["지현","애화"];              // 홀 직원 2명

// 기준 인원 (포지션 총 인원 = 기준)
const F_BASE   = 3;  // 주방 기준 3명
const B_BASE   = 0;  // 추가 주방 기준 없음
const H_BASE_WD = 2; // 홀 평일 기준 2명
const H_BASE_SP = 1; // 홀 토·일·공휴일 기준 1명

// 긴급 판단: 한 포지션에서 동시 결원이 2명 이상
const F_URGENT = 2;
const B_URGENT = 2;
const H_URGENT = 2;

const DAYS_KO   = ["일","월","화","수","목","금","토"];
const ORDER_DAYS= ["월","화","수","목","금","토","일"];
const STORAGE   = "cw_gasan_v1";

// ────────────────────────────────────────
//  한국 법정 공휴일 2025~2027 (대체 포함)
// ────────────────────────────────────────
const KR_HOL = {
  "2025-01-01":"신정","2025-01-28":"설날연휴","2025-01-29":"설날","2025-01-30":"설날연휴",
  "2025-03-01":"삼일절","2025-05-05":"어린이날","2025-05-06":"대체공휴일",
  "2025-06-06":"현충일","2025-08-15":"광복절","2025-10-03":"개천절",
  "2025-10-05":"추석연휴","2025-10-06":"추석","2025-10-07":"추석연휴",
  "2025-10-08":"대체공휴일","2025-10-09":"한글날","2025-12-25":"성탄절",
  "2026-01-01":"신정","2026-02-16":"설날연휴","2026-02-17":"설날","2026-02-18":"설날연휴",
  "2026-03-01":"삼일절","2026-03-02":"대체공휴일",
  "2026-05-05":"어린이날","2026-05-24":"부처님오신날","2026-05-25":"대체공휴일",
  "2026-06-06":"현충일","2026-08-15":"광복절","2026-08-17":"대체공휴일",
  "2026-09-24":"추석연휴","2026-09-25":"추석","2026-09-26":"추석연휴",
  "2026-10-03":"개천절","2026-10-05":"대체공휴일","2026-10-09":"한글날","2026-12-25":"성탄절",
  "2027-01-01":"신정","2027-02-06":"설날연휴","2027-02-07":"설날","2027-02-08":"설날연휴",
  "2027-03-01":"삼일절","2027-05-05":"어린이날","2027-05-13":"부처님오신날",
  "2027-06-06":"현충일","2027-06-07":"대체공휴일",
  "2027-08-15":"광복절","2027-08-16":"대체공휴일",
  "2027-10-03":"개천절","2027-10-04":"대체공휴일",
  "2027-10-09":"한글날","2027-10-14":"추석연휴","2027-10-15":"추석","2027-10-16":"추석연휴",
  "2027-12-25":"성탄절","2027-12-27":"대체공휴일"
};

// ────────────────────────────────────────
//  상태
// ────────────────────────────────────────
let weekOffset = 0;
// offMap[dateKey] = { front:[], back:[], hall:[] }  — 중요 포지션 휴무자 배열
let offMap = {};

function makeDay(){ return {front:[], back:[], hall:[]} }
function uniq(a){ return [...new Set(a||[])] }

function load(){
  try{
    const s = JSON.parse(localStorage.getItem(STORAGE)||"null");
    if(!s) return;
    weekOffset = s.weekOffset||0;
    offMap     = s.offMap||{};
    document.getElementById("holidayInput").value = s.hol||"";
    document.getElementById("bulkInput").value    = s.bulk||"";
  }catch(e){}
}
function save(){
  try{
    localStorage.setItem(STORAGE, JSON.stringify({
      weekOffset, offMap,
      hol:  document.getElementById("holidayInput").value||"",
      bulk: document.getElementById("bulkInput").value||""
    }));
  }catch(e){}
}
function saveAndRender(){ save(); renderAll(); }

// ────────────────────────────────────────
//  날짜 유틸
// ────────────────────────────────────────
function weekStart(off=0){
  const n=new Date(), m=new Date(n);
  m.setDate(n.getDate()-((n.getDay()||7)-1)+off*7);
  m.setHours(0,0,0,0); return m;
}
function dk(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function isToday(d){ const t=new Date(); return dk(d)===dk(t); }
function extraHols(){
  return (document.getElementById("holidayInput").value||"")
    .split(",").map(s=>s.trim()).filter(Boolean);
}
function isKrHol(d){ return !!KR_HOL[dk(d)]; }
function isExtraHol(d){
  const mmdd=`${d.getMonth()+1}/${d.getDate()}`;
  return extraHols().includes(mmdd);
}
function isHoliday(d){ return isKrHol(d)||isExtraHol(d); }
// 토·일·공휴일 → 홀 1명 기준
function isSpecial(d){ const w=d.getDay(); return w===6||w===0||isHoliday(d); }
function holName(d){ return KR_HOL[dk(d)]||""; }

function getOff(key){
  if(!offMap[key]) offMap[key]=makeDay();
  offMap[key].front=uniq(offMap[key].front);
  offMap[key].back =uniq(offMap[key].back);
  offMap[key].hall =uniq(offMap[key].hall);
  return offMap[key];
}
function toggleOff(key,dept,name){
  const o=getOff(key), arr=o[dept], i=arr.indexOf(name);
  if(i>=0) arr.splice(i,1); else arr.push(name);
  saveAndRender();
}

// ────────────────────────────────────────
//  핵심 분석
//
//  주방 기준: 3명
//  평일/주말 모두 주방 3명 필요
//  홀은 평일 2명, 토·일·공휴일 1명 필요
//  기준보다 인원이 많으면 → 빨간 표시
//  기준보다 인원이 적으면 → 빨간 표시 + 호출
//  결원 2명 이상 → 긴급 호출
//  홀: 평일 2명 / 토·일·공휴일 1명
// ────────────────────────────────────────
const K_BASE = 3;

function analyze(key, d){
  const off = getOff(key);
  const sp  = isSpecial(d);
  const results = [];
  const calls   = [];

  // ── 주방 합산 ──────────────────────────
  const fOff     = off.front.filter(n=>F_ALL.includes(n));
  const bOff     = off.back.filter(n=>B_ALL.includes(n));
  const fPresent = F_ALL.length - fOff.length; // 최대 6명
  const bPresent = B_ALL.length - bOff.length; // 최대 2명
  const kPresent = fPresent + bPresent;         // 합산 출근
  const kOff     = [...fOff, ...bOff];
  const kNeed    = Math.max(0, K_BASE - kPresent);

  if(kPresent > K_BASE){
    // 7명 초과 → 빨간 표시
    results.push({type:"over",
      text:`주방 ${kPresent}명 출근 — 기준(${K_BASE}명) 초과 (앞${fPresent}+뒤${bPresent})`});
  } else if(kOff.length >= 2 && kNeed > 0){
    // 결원 2명 이상 + 기준 미달 → 긴급
    results.push({type:"urgent",
      text:`🚨 긴급! 주방 결원 ${kOff.length}명 (${kOff.join(", ")})
주방 ${kNeed}분 호출`});
    for(let i=0;i<kNeed;i++) calls.push({label:"주방 1분", urgent:true});
  } else if(kNeed > 0){
    results.push({type:"call",
      text:`주방 ${kPresent}명 출근 → ${kNeed}명 호출 필요 (앞${fPresent}+뒤${bPresent}${kOff.length?" / "+kOff.join(", ")+" 휴무":""})`});
    for(let i=0;i<kNeed;i++) calls.push({label:"주방 1분", urgent:false});
  } else {
    results.push({type:"ok", text:`주방 ${kPresent}명 정상 (앞${fPresent}+뒤${bPresent})`});
  }

  // ── 가산점: 토·일·공휴일은 홀 기준만 1명으로 변경, 오후 주방 자동 호출 없음

  // ── 홀 ─────────────────────────────────
  const hOff     = off.hall.filter(n=>H_ALL.includes(n));
  const hPresent = H_ALL.length - hOff.length;
  const hBase    = sp ? H_BASE_SP : H_BASE_WD;
  const hNeed    = Math.max(0, hBase - hPresent);

  if(hPresent > hBase){
    results.push({type:"over",
      text:`홀 ${hPresent}명 출근 — 기준(${hBase}명) 초과`});
  } else if(hOff.length >= H_URGENT && hNeed > 0){
    results.push({type:"urgent",
      text:`🚨 긴급! 홀 ${hOff.length}명 결원 (${hOff.join(", ")})
홀 ${Math.max(hNeed,1)}분 호출`});
    for(let i=0;i<Math.max(hNeed,1);i++) calls.push({label:"홀 1분", urgent:true});
  } else if(hNeed > 0){
    results.push({type:"hall",
      text:`홀 ${hPresent}명 출근 → ${hNeed}명 호출 필요 (기준 ${hBase}명)${hOff.length?" / "+hOff.join(", ")+" 휴무":""}`});
    for(let i=0;i<hNeed;i++) calls.push({label:"홀 1분", urgent:false});
  } else {
    results.push({type:"ok", text:`홀 ${hPresent}명 정상 (기준 ${hBase}명)`});
  }

  return {results, calls, sp, fPresent, bPresent, kPresent, hPresent, kNeed, hNeed, hBase};
}
// ────────────────────────────────────────
//  렌더 전체
// ────────────────────────────────────────
function renderAll(){
  const ws=weekStart(weekOffset);
  const we=new Date(ws); we.setDate(ws.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById("weekLabel").textContent=
    `${ws.getFullYear()}년 ${fmt(ws)} ~ ${fmt(we)}`;

  renderGrid(ws);
  renderResultList(ws);
  renderCallBox(ws);
}

function renderGrid(ws){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const key=dk(d);
    const off=getOff(key);
    const sp=isSpecial(d);
    const hol=isHoliday(d);
    const today=isToday(d);
    const dw=d.getDay();
    const a=analyze(key,d);
    const hasUrgent=a.results.some(r=>r.type==="urgent");
    const hasCall  =a.results.some(r=>["call","half","hall"].includes(r.type));

    // 칼럼
    const col=document.createElement("div");
    col.className="dcol";
    if(hasUrgent) col.classList.add("b-urgent");
    else if(hasCall) col.classList.add("b-call");
    else if(hol) col.classList.add("b-hol");

    // 헤더
    let hc="dh";
    if(today)      hc+=" h-today";
    else if(hol)   hc+=" h-hol";      // 공휴일(주말 포함) 빨강
    else if(dw===5) hc+=" h-fri";     // 금요일 노랑
    else if(dw===0||dw===6) hc+=" h-we"; // 일·토 주황

    const hn=holName(d);
    const dayLabel = hn || DAYS_KO[dw];

    // 앞주방 칩 (전원 6명)
    const fChips = F_ALL.map(n=>chipHTML(key,"front",n,"cf",off.front)).join("");
    // 뒷주방 칩 (전원 2명)
    const bChips = B_ALL.map(n=>chipHTML(key,"back",n,"cb",off.back)).join("");
    // 홀 칩 (전원 4명)
    const hChips = H_ALL.map(n=>chipHTML(key,"hall",n,"ch",off.hall)).join("");

    // 인원 현황 미니 상태바
    const kOk  = a.kPresent >= K_BASE;
    const kOver= a.kPresent > K_BASE;
    const hOk  = a.hPresent >= a.hBase;
    const statusBar = `
      <div class="status-bar">
        <span class="sb ${kOver?"sb-over":kOk?"sb-ok":"sb-warn"}">주방${a.kPresent}/${K_BASE}(앞${a.fPresent}+뒤${a.bPresent})</span>
        <span class="sb ${hOk?"sb-ok":"sb-warn"}">홀${a.hPresent}/${a.hBase}</span>
        ${sp?'<span class="sb sb-half">홀1명</span>':""}
      </div>`;

    // 태그 (ok 제외, 최대 3개)
    const tags=a.results.filter(r=>r.type!=="ok").slice(0,3).map(r=>{
      const cls={urgent:"t-urgent",call:"t-call",half:"t-half",hall:"t-hall",over:"t-over"}[r.type]||"t-ok";
      const txt=r.text.split("\n")[0];
      return `<div class="tag ${cls}">${txt.length>26?txt.slice(0,25)+"…":txt}</div>`;
    }).join("");

    // 섹션 레이블 — 기준 인원 표시
    const kLabel = sp
      ? `주방 <span class="req req-sp">3명</span>`
      : `주방 <span class="req">3명</span>`;
    const hLabel = sp
      ? `홀 <span class="req req-sp">1명</span>`
      : `홀 <span class="req">2명</span>`;

    col.innerHTML=`
      <div class="${hc}">
        <span class="dd">${d.getDate()}</span>
        <span class="dn">${dayLabel}</span>
      </div>
      <div class="dbody">
        <div class="slabel">${kLabel}</div>
        <div class="chips">${fChips}</div>
        ${B_ALL.length ? '<div class="divider"></div><div class="chips">'+bChips+'</div>' : ''}
        <div class="slabel">${hLabel}</div>
        <div class="chips">${hChips}</div>
        ${statusBar}
        <div class="tags">${tags||'<div class="tag t-ok">정상</div>'}</div>
      </div>`;
    grid.appendChild(col);
  }
}

function chipHTML(key,dept,name,cls,offArr){
  const isOff=offArr.includes(name);
  return `<span class="chip ${cls}${isOff?" off":""}" onclick="toggleOff('${key}','${dept}','${name}')">${name}</span>`;
}

// ────────────────────────────────────────
//  결과 리스트
// ────────────────────────────────────────
function renderResultList(ws){
  const list=document.getElementById("resultList");
  list.innerHTML="";
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const key=dk(d);
    const off=getOff(key);
    const a=analyze(key,d);
    const label=`${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()]})`;
    const hasUrgent=a.results.some(r=>r.type==="urgent");
    const hasCall  =a.results.some(r=>["call","half","hall"].includes(r.type));
    const cls=hasUrgent?"ri-urgent":hasCall?"ri-call":"ri-ok";

    const offArr=[
      ...off.front.map(n=>`앞:${n}`),
      ...off.back.map(n=>`뒤:${n}`),
      ...off.hall.map(n=>`홀:${n}`)
    ];
    const offStr=offArr.join(", ")||"휴무 없음";

    const lines=a.results.map(r=>{
      const ic={urgent:"🚨",call:"📞",half:"🔆",hall:"💼",ok:"✅"}[r.type];
      return `${ic} ${r.text}`;
    }).join("\n");

    const div=document.createElement("div");
    div.className=`ri ${cls}`;
    div.innerHTML=`<span class="rday">${label} <span class="roff">${offStr}</span></span>${lines}`;
    list.appendChild(div);
  }
}

// ────────────────────────────────────────
//  짧은 호출 문구 생성
//
//  정답 형식:
//  가산점
//  이번 주 호출입니다.
//
//  내일 (월)          ← 내일인 경우
//  홀 1분
//  오후 주방 1분
//
//  화, 수, 목         ← 같은 호출 패턴 요일 묶기
//  주방 1분
//
//  토, 일
//  오후 주방 1분
//
//  부탁드립니다. 감사합니다.
// ────────────────────────────────────────
function buildCallText(ws){
  const today=new Date(); today.setHours(0,0,0,0);
  const tomorrow=new Date(today); tomorrow.setDate(today.getDate()+1);

  // 날짜별 호출 라벨 집합 수집
  const dayItems=[];
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const key=dk(d);
    const a=analyze(key,d);
    // 라벨 집계 (중복 제거)
    const seen=new Set();
    const labels=[];
    a.calls.forEach(c=>{
      const k=c.label+(c.urgent?"!":"");
      if(!seen.has(k)){ seen.add(k); labels.push({label:c.label, urgent:c.urgent}); }
    });
    if(labels.length) dayItems.push({d, dayName:DAYS_KO[d.getDay()], labels});
  }

  if(!dayItems.length){
    return "가산점\n이번 주 호출입니다.\n\n호출 인원이 없습니다.\n\n부탁드립니다. 감사합니다.";
  }

  // 같은 라벨 패턴 요일 묶기
  // signature = labels 순서대로 join
  const groups=[];
  dayItems.forEach(item=>{
    const sig=item.labels.map(l=>`${l.urgent?"!":" "}${l.label}`).join("|");
    const found=groups.find(g=>g.sig===sig);
    if(found){ found.items.push(item); }
    else groups.push({sig, labels:item.labels, items:[item]});
  });

  let text="가산점\n이번 주 호출입니다.\n";
  groups.forEach(g=>{
    // 요일 정렬
    const sorted=g.items.sort((a,b)=>
      ORDER_DAYS.indexOf(a.dayName)-ORDER_DAYS.indexOf(b.dayName));

    // 내일 단독인지 확인
    const isSingleTomorrow = sorted.length===1 && dk(sorted[0].d)===dk(tomorrow);
    let dayLabel;
    if(isSingleTomorrow){
      dayLabel=`내일 (${sorted[0].dayName})`;
    } else if(sorted.length===1){
      dayLabel=sorted[0].dayName;
    } else {
      // 연속 요일이면 "화, 수, 목" 형식
      dayLabel=ORDER_DAYS.filter(dy=>sorted.some(s=>s.dayName===dy)).join(", ");
    }

    text+=`\n${dayLabel}\n`;
    g.labels.forEach(l=>{
      text+=`${l.urgent?"🚨 긴급 ":""}${l.label}\n`;
    });
  });

  text+="\n부탁드립니다. 감사합니다.";
  return text;
}

function renderCallBox(ws){
  document.getElementById("callbox").textContent=buildCallText(ws);
}

// ────────────────────────────────────────
//  복사
// ────────────────────────────────────────
function cp(text){
  if(navigator.clipboard){ navigator.clipboard.writeText(text).catch(()=>cpFallback(text)); }
  else cpFallback(text);
}
function cpFallback(text){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.cssText="position:fixed;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand("copy"); document.body.removeChild(ta);
}
function copyShort(){
  cp(buildCallText(weekStart(weekOffset)));
  alert("짧은 호출 문구 복사 완료!");
}
function copyDetail(){
  const ws=weekStart(weekOffset);
  const we=new Date(ws); we.setDate(ws.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const lines=["=== 가산점 주간 파출 현황 ===",
    `${ws.getFullYear()}년 ${fmt(ws)} ~ ${fmt(we)}`,""];
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const key=dk(d);
    const off=getOff(key);
    const a=analyze(key,d);
    const label=`${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()]})`;
    const offStr=[...off.front.map(n=>`앞:${n}`),...off.back.map(n=>`뒤:${n}`),...off.hall.map(n=>`홀:${n}`)].join(", ")||"휴무 없음";
    lines.push(`📅 ${label}  ${offStr}`);
    a.results.forEach(r=>{
      const ic={urgent:"🚨",call:"📞",half:"🔆",hall:"💼",ok:"✅"}[r.type];
      lines.push(`  ${ic} ${r.text}`);
    });
    lines.push("");
  }
  cp(lines.join("\n"));
  alert("상세 결과 복사 완료!");
}

function clearWeek(){
  if(!confirm("이번 주 휴무를 모두 초기화할까요?")) return;
  const ws=weekStart(weekOffset);
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    delete offMap[dk(d)];
  }
  saveAndRender();
}

// ────────────────────────────────────────
//  일괄 입력
// ────────────────────────────────────────
function applyBulk(){
  const raw=document.getElementById("bulkInput").value||"";
  const ws=weekStart(weekOffset);
  raw.replace(/\r/g,"\n").split(/\n+/).map(s=>s.trim()).filter(Boolean).forEach(line=>{
    const lineDays=ORDER_DAYS.filter(d=>line.includes(d));
    if(!lineDays.length) return;

    let dept="";
    if(line.includes("앞주방"))      dept="front";
    else if(line.includes("뒷주방")) dept="back";
    else if(line.includes("주방"))   dept="kitchen";
    else if(line.includes("홀"))     dept="hall";
    if(!dept) return;

    const names=extractNames(line);
    if(!names.length) return;

    lineDays.forEach(day=>{
      const idx=DAYS_KO.indexOf(day);
      const d=new Date(ws); d.setDate(ws.getDate()+((idx+6)%7));
      const key=dk(d);
      const off=getOff(key);
      names.forEach(name=>{
        if(dept==="hall"){
          if(H_ALL.includes(name)&&!off.hall.includes(name)) off.hall.push(name);
        } else if(dept==="front"){
          if(F_ALL.includes(name)&&!off.front.includes(name)) off.front.push(name);
        } else if(dept==="back"){
          if(B_ALL.includes(name)&&!off.back.includes(name)) off.back.push(name);
        } else if(dept==="kitchen"){
          if(F_ALL.includes(name)&&!off.front.includes(name)) off.front.push(name);
          else if(B_ALL.includes(name)&&!off.back.includes(name)) off.back.push(name);
        }
      });
    });
  });
  saveAndRender();
  alert("휴무 정보가 반영되었습니다.");
}

function extractNames(line){
  let t=line
    .replace(/앞주방|뒷주방|주방|홀|휴무|연차|쉼|빠짐/g," ");
  ORDER_DAYS.forEach(d=>{t=t.replaceAll(d," ")});
  t=t.replace(/[()]/g," ").replace(/[，ㆍ·]/g,",").replace(/\s+/g," ").trim();
  if(!t) return [];
  const cands=t.includes(",")
    ?t.split(",").map(s=>s.trim()).filter(Boolean)
    :t.split(/\s+/).filter(Boolean);
  const all=[...F_ALL,...B_ALL,...H_ALL];
  return cands.filter(n=>all.includes(n));
}
